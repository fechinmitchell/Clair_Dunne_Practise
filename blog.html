    <style>
        /* Additional styles for blog page */
        .section-full {
            min-height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            overflow: hidden;
        }
        
        .section-full .image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -2;
        }
        
        /* Add overlay for better text readability */
        .section-full::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }
        
        .bodyblog {
            padding: 60px;
            background: rgba(255, 255, 255, 0.98);
            margin: 0 auto;
            max-width: 1000px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            position: relative;
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .bodyblog .heading {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-weight: 300;
            position: relative;
            padding-bottom: 20px;
        }
        
        /* Add decorative line under heading */
        .bodyblog .heading::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: #5cb3cc;
            border-radius: 2px;
        }
        
        .wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            margin-top: 50px;
        }
        
        .box {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: #f8f9fa;
            padding: 10px;
            transition: all 0.3s ease;
        }
        
        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(92, 179, 204, 0.2);
        }
        
        .box iframe {
            width: 100%;
            height: 280px;
            border-radius: 8px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Add play icon overlay effect */
        .box::before {
            content: '▶';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(92, 179, 204, 0.8);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1;
        }
        
        .box:hover::before {
            opacity: 0.9;
        }
        
        /* Add video titles */
        .box::after {
            content: attr(data-title);
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            color: #333;
            font-weight: 400;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .box:hover::after {
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .section-full {
                padding: 60px 15px;
            }
            
            .bodyblog {
                padding: 40px 25px;
                border-radius: 12px;
            }
            
            .bodyblog .heading {
                font-size: 2rem;
            }
            
            .wrapper {
                grid-template-columns: 1fr;
                gap: 25px;
                margin-top: 35px;
            }
            
            .box iframe {
                height: 200px;
            }
            
            .box::before {
                width: 50px;
                height: 50px;
                font-size: 2rem;
            }
        }
        
        @media (max-width: 480px) {
            .bodyblog {
                padding: 30px 20px;
            }
            
            .bodyblog .heading {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
